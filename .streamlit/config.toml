[server]
headless = true
runOnSave = false
fileWatcherType = "none"
maxUploadSize = 50

[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#7c3aed"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f5f3ff"
textColor = "#1f2937"
font = "sans serif"

[client]
toolbarMode = "minimal"
showErrorDetails = true
